# BlloseAgent4J Nginx 反向代理配置
# 路径: /etc/nginx/sites-available/bllose-agent

server {
    listen 80;
    server_name _;   # 替换为你的域名，如 example.com

    # 日志
    access_log /var/log/nginx/bllose-agent-access.log;
    error_log  /var/log/nginx/bllose-agent-error.log;

    # --------------------------------------------------
    # 后端 API → Spring Boot :8080
    # --------------------------------------------------
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;

        # SSE 流式响应必须关闭缓冲
        proxy_buffering off;
        proxy_cache off;

        # SSE 长连接
        proxy_set_header Connection '';
        chunked_transfer_encoding on;

        # 标准代理头
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 超时（SSE 可能长时间无数据）
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # --------------------------------------------------
    # 前端 → Vite Dev Server :5173
    # --------------------------------------------------
    location / {
        proxy_pass http://127.0.0.1:5173;
        proxy_http_version 1.1;

        # WebSocket (Vite HMR)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# BlloseAgent4J — Nginx 生产配置
# 路径: /etc/nginx/sites-available/bllose-agent
#
# 请求链路:
#   /     → frontend/dist/ 静态文件 (Vue SPA)
#   /api/ → proxy_pass 127.0.0.1:8080 (Spring Boot, 含 SSE 流式)

server {
    listen 80;
    server_name _;   # 部署时替换为实际域名

    access_log /var/log/nginx/bllose-agent-access.log;
    error_log  /var/log/nginx/bllose-agent-error.log;

    # 前端静态文件根目录 (npm run build 产物)
    root /home/ubuntu/bllose-agent4j/frontend/dist;
    index index.html;

    # ── API 代理 → Spring Boot :8080 ──
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;

        # SSE 流式响应必须关闭缓冲
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;

        # SSE 长连接保持
        proxy_set_header Connection '';
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── SPA fallback (Vue Router HTML5 History 模式) ──
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# ── 第一层：规则引擎配置 ──
# 重启服务后生效，无需重新编译

guard:
  # 最大输入长度（字符数）
  max-input-length: 2000

  # ── 提示词注入 / 越狱检测 ──
  injection-patterns:
    # 英文
    - "ignore\\s+(all\\s+)?(previous|above|prior)\\s+(instructions?|prompts?|messages?|conversation)"
    - "ignore\\s+your\\s+(instructions?|programming|rules?)"
    - "(forget|disregard|discard)\\s+(all\\s+)?(previous|above|prior|earlier)\\s+(instructions?|prompts?|context)"
    - "(you\\s+are\\s+now|from\\s+now\\s+on\\s+you\\s+are|act\\s+as\\s+a)\\s+(DAN|STAN|DUDE|MONGO|TOM|evil|unethical|unrestricted)"
    - "(DAN|STAN|DUDE|MONGO|TOM)\\s*(mode|prompt)"
    - "(reveal|show|tell|print|output|display|give\\s+me)\\s+(your|the)\\s+(system\\s+)?(prompts?|instructions?|rules?|guidelines?)"
    - "(developer|admin|sudo|god|super\\s*user)\\s*mode"
    - "(jailbreak|越狱|绕过限制|破解)"
    - "(pretend|imagine|role\\s*play|acting)\\s*(you\\s*are|to\\s*be|as)"
    - "do\\s+anything\\s+now"
    - "I\\s+am\\s+your\\s+(creator|developer|admin|master|owner)"
    - "(reset|reload|reinit(?:ialize)?)\\s+(your|the)\\s+(instructions?|prompt|system)"
    - "new\\s+(set\\s+of\\s+)?(instructions?|directives?|rules?|commands?)\\s*(:|：|are|is)"
    - "(you\\s+must|you\\s+will|you\\s+shall)\\s+(obey|follow|comply)"
    - "(override|overwrite|replace)\\s+(your|the)\\s+(instructions?|prompt|rules?)"
    - "you\\s+are\\s+(not\\s+an?\\s+)?(AI|assistant|language\\s+model|chat\\s*bot)"
    - "you\\s+no\\s+longer\\s+have\\s+(restrictions?|limitations?|rules?|ethics?)"
    - "remove\\s+(your\\s+)?(restrictions?|filters?|limitations?|guardrails?)"
    - "ignore\\s+all\\s+(constraints?|restrictions?|limitations?|ethical)"
    # 中文
    - "忽略.*(指令|提示|规则|对话|限制|约束|设定)"
    - "(忘记|无视|抛弃).*(指令|提示|规则|对话)"
    - "(现在起你是|从现在开始你是|你现在是|你要扮演)(DAN|邪恶|无限制|无约束|坏)"
    - "(揭示|显示|告诉|输出|透露).*(提示词|指令|规则|设定|系统)"
    - "(开发者|管理员|超级用户|上帝)模式"
    - "(假装|扮演|假扮|充当|模拟).*(你是|一个|AI|助手|专家|机器人)"
    - "你是(我的)(创造者|开发者|管理员|主人|老板)"
    - "(重置|重新加载|清除).*(指令|提示|规则|记忆|对话)"
    - "(新的).*(指令|指示|规则|命令)"
    - "你必须(服从|遵守|听从|执行)"
    - "(覆盖|替换|修改).*(指令|提示|规则)"
    - "告诉我你的.*(名字|身份|秘密|提示)"
    - "你的.*(提示词|系统提示|规则).*是什么"

  # ── 技术攻击检测 ──
  technical-attack-patterns:
    - "\\b(UNION\\s+(ALL\\s+)?SELECT|DROP\\s+TABLE|INSERT\\s+INTO|DELETE\\s+FROM|UPDATE\\s+\\w+\\s+SET)\\b"
    - "(\\bOR\\b|\\bAND\\b)\\s+['\"]?\\d+['\"]?\\s*=\\s*['\"]?\\d+['\"]?"
    - "--\\s*$|;\\s*(DROP|DELETE|INSERT|UPDATE|SELECT)"
    - "<script\\b[^>]*>"
    - "javascript\\s*:"
    - "on(load|error|click|mouse|key|focus|blur)\\s*="
    - "[;&|`]\\s*(rm\\s+-rf|cat\\s+/etc|wget\\s+|curl\\s+|chmod|mkfs|dd\\s+if=)"

  # ── Guest 用户论文领域白名单 ──
  guest:
